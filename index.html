<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solid Lite | CDN Distribution</title>
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --border: 240 5.9% 90%;
        --radius: 0.5rem;

        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: 240 10% 3.9%;
          --foreground: 0 0% 98%;
          --card: 240 10% 3.9%;
          --card-foreground: 0 0% 98%;
          --muted: 240 3.7% 15.1%;
          --muted-foreground: 240 5% 64.9%;
          --border: 240 3.7% 15.1%;
        }
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .container {
        margin-left: auto;
        margin-right: auto;
        padding: 1.5rem;
        max-width: 800px;
      }

      .title {
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.05em;
        margin-bottom: 0.5rem;
        margin-top: 2rem;
      }

      .description {
        color: hsl(var(--muted-foreground));
        font-size: 1.125rem;
        margin-bottom: 2.5rem;
      }

      .counter {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2.5rem;
      }

      .counter-btn {
        width: 2.75rem;
        height: 2.75rem;
        font-size: 1rem;
        font-weight: 600;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--card));
        color: hsl(var(--foreground));
        border-radius: 0.6rem;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease;
      }

      .counter-btn:hover {
        border-color: hsl(var(--foreground) / 0.5);
        transform: scale(1.05);
      }

      .counter-value {
        font-size: 1.75rem;
        font-weight: 600;
        min-width: 2.5rem;
        font-variant-numeric: tabular-nums;
        text-align: center;
      }

      .btn-reset {
        display: block;
        margin: 0;
        font-size: 0.875rem;
        font-weight: 500;
        color: hsl(var(--muted-foreground));
        background: none;
        border: none;
        cursor: pointer;
        text-decoration: underline;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      .btn-reset:hover {
        opacity: 1;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: hsl(var(--muted));
        color: hsl(var(--foreground));
        padding: 0.15rem 0.4rem;
        border-radius: 0.35rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import {
        createEffect,
        createSignal,
        h,
        render,
      } from "https://esm.sh/jsr/@carlosxfelipe/solid-lite@1.0.3";

      function Counter() {
        const [count, setCount] = createSignal(
          Number(localStorage.getItem("solid_lite_count") || 13),
        );

        createEffect(() => {
          localStorage.setItem("solid_lite_count", count().toString());
        });

        return h(
          "div",
          null,
          h(
            "div",
            { class: "counter" },
            h("button", {
              class: "counter-btn",
              onClick: () => setCount(count() - 1),
            }, "−1"),
            h("span", { class: "counter-value" }, count),
            h("button", {
              class: "counter-btn",
              onClick: () => setCount(count() + 1),
            }, "+1"),
          ),
          h("button", {
            class: "btn-reset",
            onClick: () => setCount(0),
          }, "Reset Counter"),
        );
      }

      function App() {
        return h(
          "div",
          { class: "container" },
          h("h1", { class: "title" }, "Welcome to Solid Lite"),
          h(
            "p",
            { class: "description" },
            "Edit ",
            h("code", null, "index.html"),
            " and refresh the page to see your changes.",
          ),
          h(Counter),
        );
      }

      render(h(App), document.getElementById("app"));
    </script>
  </body>
</html>
